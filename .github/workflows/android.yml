name: Build Android App Bundle

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Sync web assets into Android
        run: npx cap sync android

      - name: Restore signing config from secrets
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/upload.jks
          {
            echo "storeFile=$GITHUB_WORKSPACE/android/upload.jks"
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}"
            echo "keyAlias=${{ secrets.KEY_ALIAS }}"
            echo "keyPassword=${{ secrets.KEYSTORE_PASSWORD }}"
          } > android/keystore.properties

      - name: Build signed release bundle
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload .aab artifact
        uses: actions/upload-artifact@v4
        with:
          name: meldplus-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
